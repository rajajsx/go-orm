            displayName: Apply Kubernetes Deployment
            condition: or(eq(variables.SDP_SAHEL_CHANGED, 'true'), eq(variables.DEPLOYMENT_FILES_CHANGED, 'true'), eq(variables.BUILD_ALL_SERVICES, 'true'))
            inputs:
              connectionType: 'KubernetesServiceConnection'
              kubernetesServiceEndpoint: '$(K8S_SERVICE_CONNECTION)'
              # namespace: '$(NAMESPACE)'
              command: 'apply'
              useConfigurationFile: true
              configuration: '$(Pipeline.Workspace)/Build_$(Build.SourceBranchName)_SAH-SDP-SDPGOServices/sdpsahel-k8s-resources.yaml'
              arguments: '--validate=false --insecure-skip-tls-verify'

          # Apply Kubernetes Manifests - SDP_Relay_Worker
