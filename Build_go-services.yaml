trigger:
  - dev
  - test
  - uat
  - preprod
  - prod

pool:
  name: 'Lin_05_agentpool'  # Your on-prem Linux agent pool

variables:
  GO_VERSION: '1.23.9'
  DOCKER_TAG: '$(Build.BuildId)'
  ENVIRONMENT: '$(Build.SourceBranchName)'
  IMAGE_NAME: '$(ENVIRONMENT)-sdp-go-services'
  HARBOR_PROJECT: '$(ENVIRONMENT)-sdp-go-services'
  HARBOR_REGISTRY: 'nprod-harbor.mohre.gov.ae'
  HARBOR_PROD_REGISTRY: 'prod-harbor.mohre.gov.ae'

  # Set to 'true' to force build all services regardless of changes
  BUILD_ALL_SERVICES: 'true'
  
  # Define environment-specific service connections
  ${{ if eq(variables['Build.SourceBranchName'], 'dev') }}:
    NAMESPACE: 'keycloak'
    INGRESSNAMESPACE: 'keycloak'
    K8S_SERVICE_CONNECTION: 'dev-kubernetes'
    VAULT_ROLE: 'dev_vault_sdp_microservices_read_policy_role'
    VAULT_IMAGE: 'nprod-harbor.mohre.gov.ae/hashicorp-keyvault/vault:1.19.3'
    VAULT_SERVICE: 'https://vault-dev.mohredevdc.local'
    VAULT_SECRET_PATH: 'kv/data/sdp_microservices'
    VAULT_REDIS_TLS_SECRET_PATH: 'kv/data/sdp_microservices/redistls'
    VAULT_SERVICE_ACCOUNTNAME: 'prodvaultuser'
    CONTAINER_REGISTRY_CONNECTION: 'nprod_harbor'
    FULL_IMAGE_NAME: '$(HARBOR_REGISTRY)/$(HARBOR_PROJECT)/$(IMAGE_NAME):$(DOCKER_TAG)'
  ${{ if eq(variables['Build.SourceBranchName'], 'test') }}:
    NAMESPACE: 'sdp'
    INGRESSNAMESPACE: 'ingress-nginx'
    K8S_SERVICE_CONNECTION: 'test-kubernetes'
    VAULT_ROLE: 'test_vault_sdp_microservices_read_policy_role'
    VAULT_IMAGE: 'nprod-harbor.mohre.gov.ae/hashicorp-keyvault/vault:1.19.3'
    VAULT_SERVICE: 'https://vault-test.mohredevdc.local'
    VAULT_SECRET_PATH: 'kv/data/sdp_microservices'
    VAULT_REDIS_TLS_SECRET_PATH: 'kv/data/sdp_microservices/redistls'
    VAULT_SERVICE_ACCOUNTNAME: 'test-sdp-vault-integration-account'
    CONTAINER_REGISTRY_CONNECTION: 'nprod_harbor'
    FULL_IMAGE_NAME: '$(HARBOR_REGISTRY)/$(HARBOR_PROJECT)/$(IMAGE_NAME):$(DOCKER_TAG)'
  ${{ if eq(variables['Build.SourceBranchName'], 'uat') }}:
    NAMESPACE: 'sdp'
    INGRESSNAMESPACE: 'ingress-nginx'
    K8S_SERVICE_CONNECTION: 'uat-kubernetes'
    VAULT_ROLE: 'uat_vault_sdp_microservices_read_policy_role'
    VAULT_IMAGE: 'nprod-harbor.mohre.gov.ae/hashicorp-keyvault/vault:1.19.3'
    VAULT_SERVICE: 'https://vault-uat.mohredevdc.local'
    VAULT_SECRET_PATH: 'kv/data/sdp_microservices'
    VAULT_REDIS_TLS_SECRET_PATH: 'kv/data/sdp_microservices/redistls'
    VAULT_SERVICE_ACCOUNTNAME: 'uat-sdp-vault-integration-account'
    CONTAINER_REGISTRY_CONNECTION: 'nprod_harbor'
    FULL_IMAGE_NAME: '$(HARBOR_REGISTRY)/$(HARBOR_PROJECT)/$(IMAGE_NAME):$(DOCKER_TAG)'
  ${{ if eq(variables['Build.SourceBranchName'], 'preprod') }}:
    NAMESPACE: 'sdp'
    INGRESSNAMESPACE: 'ingress-nginx'
    K8S_SERVICE_CONNECTION: 'preprod-kubernetes'
    VAULT_NAMESPACE: 'sahel_sdp'
    VAULT_ROLE: 'preprod_vault_sdp_microservices_read_policy_role'
    VAULT_IMAGE: 'nprod-harbor.mohre.gov.ae/hashicorp-keyvault/vault:1.19.3'
    VAULT_SERVICE: 'https://vault-preprod.mohre.gov.ae'
    VAULT_SECRET_PATH: 'sdp_microservices/kv/data/sdp_microservices'
    VAULT_REDIS_TLS_SECRET_PATH: 'sdp_microservices/kv/data/sdp_microservices/redistls'
    VAULT_SERVICE_ACCOUNTNAME: 'preprod-sdp-vault-integration-account'
    CONTAINER_REGISTRY_CONNECTION: 'nprod_harbor'
    FULL_IMAGE_NAME: '$(HARBOR_REGISTRY)/$(HARBOR_PROJECT)/$(IMAGE_NAME):$(DOCKER_TAG)'
  ${{ if eq(variables['Build.SourceBranchName'], 'prod') }}:
    NAMESPACE: 'sdp'
    INGRESSNAMESPACE: 'ingress-nginx'
    K8S_SERVICE_CONNECTION: 'prod-kubernetes'
    VAULT_NAMESPACE: 'sahel_sdp'
    VAULT_ROLE: 'prod_vault_sdp_microservices_read_policy_role'
    VAULT_IMAGE: 'prod-harbor.mohre.gov.ae/hashicorp-keyvault/vault:1.19.3'
    VAULT_SERVICE: 'https://vault.mohre.gov.ae'
    VAULT_SECRET_PATH: 'sdp_microservices/kv/data/sdp_microservices'
    VAULT_REDIS_TLS_SECRET_PATH: 'sdp_microservices/kv/data/sdp_microservices/redistls'
    VAULT_SERVICE_ACCOUNTNAME: 'prod-sdp-vault-integration-account'
    CONTAINER_REGISTRY_CONNECTION: 'prod_harbor'
    FULL_IMAGE_NAME: '$(HARBOR_REGISTRY)/$(HARBOR_PROJECT)/$(IMAGE_NAME):$(DOCKER_TAG)'

stages:
- stage: CheckChanges
  jobs:
    - job: DetectChanges
      steps:
        # Configure Git Identity from Build Service
        - script: |
            echo "Configuring Git identity from build service..."
            
            # Use Azure DevOps build service identity
            git config user.email "$(Build.RequestedForEmail)"
            git config user.name "$(Build.RequestedFor)"
            
            # Add safe directory
            git config --global --add safe.directory '*'
            
            echo "Git identity configured as: $(Build.RequestedFor) <$(Build.RequestedForEmail)>"
          displayName: "Configure Git Identity"
          workingDirectory: $(Build.SourcesDirectory)

        # Generate Build Tag with Branch, Timestamp, and Counter
        - script: |
            CurrentDate=$(date +%Y%m%d)
            CurrentTime=$(date +%H%M)
            BranchName=$(Build.SourceBranchName)
            
            echo "Current Date: ${CurrentDate}"
            echo "Current Time: ${CurrentTime}"
            echo "Branch Name: ${BranchName}"
            
            # Fetch all tags from remote using system access token
            echo "Fetching tags from remote..."
            git -c http.extraheader="AUTHORIZATION: bearer $(System.AccessToken)" fetch --tags
            
            # Count existing tags for today with the current branch
            Counter=$(git tag -l "DAA-GoServices_${BranchName}_${CurrentDate}.*" | wc -l)
            echo "Found ${Counter} existing tags for today"
            
            # Increment counter for new tag
            Counter=$((Counter + 1))
            echo "New counter value: ${Counter}"
            
            # Generate the build tag
            BuildTag="DAA-GoServices_${BranchName}_${CurrentDate}.${Counter}-${CurrentTime}"
            echo "##vso[task.setvariable variable=BuildTag]${BuildTag}"
            echo "Generated Build Tag: ${BuildTag}"
          displayName: "Generate Build Tag with Counter"
          workingDirectory: $(Build.SourcesDirectory)
          env:
            SYSTEM_ACCESSTOKEN: $(System.AccessToken)

        # Create and Push Git Tag
        - script: |
            cd "$(Build.SourcesDirectory)"
            
            echo "Creating tag: $(BuildTag)"
            git tag -a $(BuildTag) -m "Build tag for $(BuildTag) - Build ID: $(Build.BuildId)"
            
            echo "Pushing tag to remote..."
            git -c http.extraheader="AUTHORIZATION: bearer $(System.AccessToken)" push origin $(BuildTag)
            
            echo "Build tag $(BuildTag) created and pushed successfully"
          displayName: "Create and Push Git Tag"
          condition: succeeded()
          env:
            SYSTEM_ACCESSTOKEN: $(System.AccessToken)

        - task: Bash@3
          name: SetVars
          inputs:
            targetType: 'inline'
            script: |
              # Get the changes between current and previous commit
              changes=$(git diff --name-only HEAD^ HEAD)
              echo "Changes detected: $changes"

              # Services to check
              services=(
                  "services/auth_service/:AUTH_SERVICE_CHANGED"
                  "services/sdp-actions-api/:SDP_ACTIONS_CHANGED"
                  "services/sdp-admin-api/:SDP_ADMIN_CHANGED"
                  "services/sdp-example-api/:SDP_EXAMPLE_CHANGED"
                  "services/sdp-sahel-api/:SDP_SAHEL_CHANGED"
                  "services/sdp-relay-worker/:SDP_RELAY_WORKER_CHANGED"
                  "services/sdp-audit-processor/:SDP_AUDIT_PROCESSOR_CHANGED"
                  "services/sdp-elastic-sync/:SDP_ELASTIC_SYNC_CHANGED"
                  "services/sdp-background-jobs/:SDP_BACKGROUND_JOBS_CHANGED"
                  "services/sdp-notifications-worker/:SDP_NOTIFICATIONS_WORKER_CHANGED"
                  "services/sdp-sla-listener/:SDP_SLA_LISTENER_CHANGED"
                  "Dockerfile|Build_go-services.yaml|k8/.*deployment.*\.yaml|k8/.*resources.*\.yaml:DEPLOYMENT_FILES_CHANGED"
              )

              # Loop through each service
              for service in "${services[@]}"; do
                folder="${service%%:*}"  # Pattern before colon
                var="${service##*:}"     # Variable after colon

                if echo "$changes" | grep -Eq "${folder}"; then
                  echo "Changes detected in ${folder}"
                  echo "##vso[task.setvariable variable=${var};isOutput=true]true"
                else
                  echo "No changes detected in ${folder}"
                  echo "##vso[task.setvariable variable=${var};isOutput=true]false"
                fi
              done

- stage: BuildAndPush
  dependsOn: CheckChanges
  displayName: Build and Push Docker Image
  variables:
    - name: BUILD_ALL_SERVICES
      value: ${{ variables.BUILD_ALL_SERVICES }}
    - name: AUTH_SERVICE_CHANGED
      value: $[ stageDependencies.CheckChanges.DetectChanges.outputs['SetVars.AUTH_SERVICE_CHANGED'] ]
    - name: SDP_ACTIONS_CHANGED
      value: $[ stageDependencies.CheckChanges.DetectChanges.outputs['SetVars.SDP_ACTIONS_CHANGED'] ]
    - name: SDP_ADMIN_CHANGED
      value: $[ stageDependencies.CheckChanges.DetectChanges.outputs['SetVars.SDP_ADMIN_CHANGED'] ]
    - name: SDP_EXAMPLE_CHANGED
      value: $[ stageDependencies.CheckChanges.DetectChanges.outputs['SetVars.SDP_EXAMPLE_CHANGED'] ]
    - name: SDP_SAHEL_CHANGED
      value: $[ stageDependencies.CheckChanges.DetectChanges.outputs['SetVars.SDP_SAHEL_CHANGED'] ]
    - name: SDP_RELAY_WORKER_CHANGED
      value: $[ stageDependencies.CheckChanges.DetectChanges.outputs['SetVars.SDP_RELAY_WORKER_CHANGED'] ]
    - name: SDP_AUDIT_PROCESSOR_CHANGED
      value: $[ stageDependencies.CheckChanges.DetectChanges.outputs['SetVars.SDP_AUDIT_PROCESSOR_CHANGED'] ]
    - name: SDP_ELASTIC_SYNC_CHANGED
      value: $[ stageDependencies.CheckChanges.DetectChanges.outputs['SetVars.SDP_ELASTIC_SYNC_CHANGED'] ]
    - name: SDP_BACKGROUND_JOBS_CHANGED
      value: $[ stageDependencies.CheckChanges.DetectChanges.outputs['SetVars.SDP_BACKGROUND_JOBS_CHANGED'] ]
    - name: SDP_NOTIFICATIONS_WORKER_CHANGED
      value: $[ stageDependencies.CheckChanges.DetectChanges.outputs['SetVars.SDP_NOTIFICATIONS_WORKER_CHANGED'] ]
    - name: SDP_SLA_LISTENER_CHANGED
      value: $[ stageDependencies.CheckChanges.DetectChanges.outputs['SetVars.SDP_SLA_LISTENER_CHANGED'] ]
    - name: DEPLOYMENT_FILES_CHANGED
      value: $[ stageDependencies.CheckChanges.DetectChanges.outputs['SetVars.DEPLOYMENT_FILES_CHANGED'] ]
  jobs:
  - job: Build
    displayName: Build and Push Docker Image
    steps:   
    # Build Go application
    - task: Bash@3
      displayName: 'Build Go Application'
      inputs:
        targetType: 'inline'
        script: |
          echo "BUILD_ALL_SERVICES value: $(BUILD_ALL_SERVICES)"
          echo "AUTH_SERVICE_CHANGED value: $(AUTH_SERVICE_CHANGED)"
          echo "SDP_ACTIONS_CHANGED value: $(SDP_ACTIONS_CHANGED)"
          echo "SDP_EXAMPLE_CHANGED value: $(SDP_EXAMPLE_CHANGED)"
          echo "SDP_ADMIN_CHANGED value: $(SDP_ADMIN_CHANGED)"
          echo "SDP_SAHEL_CHANGED value: $(SDP_SAHEL_CHANGED)"
          echo "SDP_RELAY_WORKER_CHANGED value: $(SDP_RELAY_WORKER_CHANGED)"
          echo "SDP_AUDIT_PROCESSOR_CHANGED value: $(SDP_AUDIT_PROCESSOR_CHANGED)"
          echo "SDP_ELASTIC_SYNC_CHANGED value: $(SDP_ELASTIC_SYNC_CHANGED)"
          echo "SDP_BACKGROUND_JOBS_CHANGED value: $(SDP_BACKGROUND_JOBS_CHANGED)"
          echo "SDP_NOTIFICATIONS_WORKER_CHANGED value: $(SDP_NOTIFICATIONS_WORKER_CHANGED)"
          echo "SDP_SLA_LISTENER_CHANGED value: $(SDP_SLA_LISTENER_CHANGED)"
          echo "DEPLOYMENT_FILES_CHANGED value: $(DEPLOYMENT_FILES_CHANGED)"

          # Create app directory
          mkdir -p app

          export GOROOT=/data1/go-versions/go1.23.0
          export GOPATH=/data1/go-path
          export GOCACHE=/data1/go-cache

          if [ "$AUTH_SERVICE_CHANGED" = "true" ] || [ "$DEPLOYMENT_FILES_CHANGED" = "true" ] || [ "$BUILD_ALL_SERVICES" = "true" ]; then
            echo "Building auth_service"
            cd services/auth_service
            go mod tidy
            CGO_ENABLED=0 GOOS=linux GOARCH=amd64 /data1/go/bin/go build -ldflags="-w -s" -o auth_service ./cmd/server
            chmod +x auth_service
            cp auth_service ../../app/
            cd ../../
          else
            echo "Skipping auth_service build (AUTH_SERVICE_CHANGED is not true)"
          fi

          if [ "$SDP_ACTIONS_CHANGED" = "true" ] || [ "$DEPLOYMENT_FILES_CHANGED" = "true" ] || [ "$BUILD_ALL_SERVICES" = "true" ]; then
            echo "Building sdp-actions-api"
            cd services/sdp-actions-api
            go mod tidy
            CGO_ENABLED=0 GOOS=linux GOARCH=amd64 /data1/go/bin/go build -ldflags="-w -s" -o sdp-actions-api ./cmd/server
            chmod +x sdp-actions-api
            cp sdp-actions-api ../../app/
            cd ../../
          else
            echo "Skipping sdp-actions-change build (SDP_ACTIONS_CHANGED is not true)"
          fi

          if [ "$SDP_SAHEL_CHANGED" = "true" ] || [ "$DEPLOYMENT_FILES_CHANGED" = "true" ] || [ "$BUILD_ALL_SERVICES" = "true" ]; then
            echo "Building sdp-sahel-api"
            cd services/sdp-sahel-api
            go mod tidy
            CGO_ENABLED=0 GOOS=linux GOARCH=amd64 /data1/go/bin/go build -ldflags="-w -s" -o sdp-sahel-api ./cmd/server
            chmod +x sdp-sahel-api
            cp sdp-sahel-api ../../app/
            cd ../../
          else
            echo "Skipping sdp-sahel-change build (SDP_SAHEL_CHANGED is not true)"
          fi

          if [ "$SDP_ADMIN_CHANGED" = "true" ] || [ "$DEPLOYMENT_FILES_CHANGED" = "true" ] || [ "$BUILD_ALL_SERVICES" = "true" ]; then
            echo "Building sdp-admin-api"
            cd services/sdp-admin-api
            go mod tidy
            CGO_ENABLED=0 GOOS=linux GOARCH=amd64 /data1/go/bin/go build -ldflags="-w -s" -o sdp-admin-api ./cmd/server
            chmod +x sdp-admin-api
            cp sdp-admin-api ../../app/
            cd ../../
          else
            echo "Skipping sdp-admin-api build (SDP_ADMIN_CHANGED is not true)"
          fi

          if [ "$SDP_RELAY_WORKER_CHANGED" = "true" ] || [ "$DEPLOYMENT_FILES_CHANGED" = "true" ] || [ "$BUILD_ALL_SERVICES" = "true" ]; then
            echo "Building sdp-relay-worker"
            cd services/sdp-relay-worker
            go mod tidy
            CGO_ENABLED=0 GOOS=linux GOARCH=amd64 /data1/go/bin/go build -ldflags="-w -s" -o sdp-relay-worker ./cmd/server
            chmod +x sdp-relay-worker
            cp sdp-relay-worker ../../app/
            cd ../../
          else
            echo "Skipping sdp-relay-worker build (SDP_RELAY_WORKER_CHANGED is not true)"
          fi

          if [ "$SDP_AUDIT_PROCESSOR_CHANGED" = "true" ] || [ "$DEPLOYMENT_FILES_CHANGED" = "true" ] || [ "$BUILD_ALL_SERVICES" = "true" ]; then
            echo "Building sdp-audit-processor"
            cd services/sdp-audit-processor
            go mod tidy
            CGO_ENABLED=0 GOOS=linux GOARCH=amd64 /data1/go/bin/go build -ldflags="-w -s" -o sdp-audit-processor ./cmd/server
            chmod +x sdp-audit-processor
            cp sdp-audit-processor ../../app/
            cd ../../
          else
            echo "Skipping sdp-audit-processor build (SDP_AUDIT_PROCESSOR_CHANGED is not true)"
          fi

          if [ "$SDP_ELASTIC_SYNC_CHANGED" = "true" ] || [ "$DEPLOYMENT_FILES_CHANGED" = "true" ] || [ "$BUILD_ALL_SERVICES" = "true" ]; then
            echo "Building sdp-elastic-sync"
            cd services/sdp-elastic-sync
            go mod tidy
            CGO_ENABLED=0 GOOS=linux GOARCH=amd64 /data1/go/bin/go build -ldflags="-w -s" -o sdp-elastic-sync ./cmd/server
            chmod +x sdp-elastic-sync
            cp sdp-elastic-sync ../../app/
            cd ../../
          else
            echo "Skipping sdp-elastic-sync build (SDP_ELASTIC_SYNC_CHANGED is not true)"
          fi

          if [ "$SDP_BACKGROUND_JOBS_CHANGED" = "true" ] || [ "$DEPLOYMENT_FILES_CHANGED" = "true" ] || [ "$BUILD_ALL_SERVICES" = "true" ]; then
            echo "Building sdp-background-jobs"
            cd services/sdp-background-jobs
            go mod tidy
            CGO_ENABLED=0 GOOS=linux GOARCH=amd64 /data1/go/bin/go build -ldflags="-w -s" -o sdp-background-jobs ./cmd/server
            chmod +x sdp-background-jobs
            cp sdp-background-jobs ../../app/
            cd ../../
          else
            echo "Skipping sdp-background-jobs build (SDP_BACKGROUND_JOBS_CHANGED is not true)"
          fi

          if [ "$SDP_NOTIFICATIONS_WORKER_CHANGED" = "true" ] || [ "$DEPLOYMENT_FILES_CHANGED" = "true" ] || [ "$BUILD_ALL_SERVICES" = "true" ]; then
            echo "Building sdp-notifications-worker"
            cd services/sdp-notifications-worker
            go mod tidy
            CGO_ENABLED=0 GOOS=linux GOARCH=amd64 /data1/go/bin/go build -ldflags="-w -s" -o sdp-notifications-worker ./cmd/server
            chmod +x sdp-notifications-worker
            cp sdp-notifications-worker ../../app/
            cd ../../
          else
            echo "Skipping sdp-notifications-worker build (SDP_NOTIFICATIONS_WORKER_CHANGED is not true)"
          fi

          if [ "$SDP_SLA_LISTENER_CHANGED" = "true" ] || [ "$DEPLOYMENT_FILES_CHANGED" = "true" ] || [ "$BUILD_ALL_SERVICES" = "true" ]; then
            echo "Building sdp-sla-listener"
            cd services/sdp-sla-listener
            go mod tidy
            CGO_ENABLED=0 GOOS=linux GOARCH=amd64 /data1/go/bin/go build -ldflags="-w -s" -o sdp-sla-listener ./cmd/listener
            chmod +x sdp-sla-listener
            cp sdp-sla-listener ../../app/
            cd ../../
          else
            echo "Skipping sdp-sla-listener build (SDP_SLA_LISTENER_CHANGED is not true)"
          fi

        # cd ../sdp-example-api
        # go mod tidy
        # GOOS=linux GOARCH=amd64 /data1/go/bin/go build -ldflags="-w -s" -o sdp-example-api
        # chmod +x sdp-example-api
        # cp sdp-example-api ../../app/

    - task: Docker@2
      displayName: Build and Push Docker Image
      inputs:
        command: buildAndPush
        repository: '$(HARBOR_PROJECT)/$(IMAGE_NAME)'
        containerRegistry: '$(CONTAINER_REGISTRY_CONNECTION)'
        tags: |
          $(DOCKER_TAG)
          latest

    - task: Bash@3
      displayName: 'Process Kubernetes Manifests'
      inputs:
        targetType: 'inline'
        script: |
          mkdir -p $(Build.ArtifactStagingDirectory)/Build_$(Build.SourceBranchName)_SAH-SDP-SDPGOServices

          # auth_service
          if [[ "${ENVIRONMENT}" == "prod" || "${ENVIRONMENT}" == "preprod" ]]; then
            sed -i '/vault.hashicorp.com\/agent-inject: '\''true'\''/a\
                  vault.hashicorp.com/namespace: '\'''"${VAULT_NAMESPACE}"''\''\' k8/authentication-k8s-resources.yaml
          fi

          sed -e "s|\${NAMESPACE}|${NAMESPACE}|g" \
              -e "s|\${VAULT_ROLE}|${VAULT_ROLE}|g" \
              -e "s|\${VAULT_IMAGE}|${VAULT_IMAGE}|g" \
              -e "s|\${ENVIRONMENT}|${ENVIRONMENT}|g" \
              -e "s|\${VAULT_SERVICE}|${VAULT_SERVICE}|g" \
              -e "s|\${FULL_IMAGE_NAME}|${FULL_IMAGE_NAME}|g" \
              -e "s|\${INGRESSNAMESPACE}|${INGRESSNAMESPACE}|g" \
              -e "s|\${VAULT_SECRET_PATH}|${VAULT_SECRET_PATH}|g" \
              -e "s|\${VAULT_SERVICE_ACCOUNTNAME}|${VAULT_SERVICE_ACCOUNTNAME}|g" \
              -e "s|\${VAULT_REDIS_TLS_SECRET_PATH}|${VAULT_REDIS_TLS_SECRET_PATH}|g" \
              k8/authentication-k8s-resources.yaml > $(Build.ArtifactStagingDirectory)/Build_$(Build.SourceBranchName)_SAH-SDP-SDPGOServices/authentication-k8s-resources.yaml
          
          # sdp-actions-api
          if [[ "${ENVIRONMENT}" == "prod" || "${ENVIRONMENT}" == "preprod" ]]; then
            sed -i '/vault.hashicorp.com\/agent-inject: '\''true'\''/a\
                  vault.hashicorp.com/namespace: '\'''"${VAULT_NAMESPACE}"''\''\' k8/sdpactions-k8s-resources.yaml
          fi

          sed -e "s|\${NAMESPACE}|${NAMESPACE}|g" \
              -e "s|\${VAULT_ROLE}|${VAULT_ROLE}|g" \
              -e "s|\${VAULT_IMAGE}|${VAULT_IMAGE}|g" \
              -e "s|\${ENVIRONMENT}|${ENVIRONMENT}|g" \
              -e "s|\${VAULT_SERVICE}|${VAULT_SERVICE}|g" \
              -e "s|\${FULL_IMAGE_NAME}|${FULL_IMAGE_NAME}|g" \
              -e "s|\${INGRESSNAMESPACE}|${INGRESSNAMESPACE}|g" \
              -e "s|\${VAULT_SECRET_PATH}|${VAULT_SECRET_PATH}|g" \
              -e "s|\${VAULT_SERVICE_ACCOUNTNAME}|${VAULT_SERVICE_ACCOUNTNAME}|g" \
              -e "s|\${VAULT_REDIS_TLS_SECRET_PATH}|${VAULT_REDIS_TLS_SECRET_PATH}|g" \
              k8/sdpactions-k8s-resources.yaml > $(Build.ArtifactStagingDirectory)/Build_$(Build.SourceBranchName)_SAH-SDP-SDPGOServices/sdpactions-k8s-resources.yaml

          # sdp-sahel-api
          if [[ "${ENVIRONMENT}" == "prod" || "${ENVIRONMENT}" == "preprod" ]]; then
            sed -i '/vault.hashicorp.com\/agent-inject: '\''true'\''/a\
                  vault.hashicorp.com/namespace: '\'''"${VAULT_NAMESPACE}"''\''\' k8/sdpsahel-k8s-resources.yaml
          fi

          sed -e "s|\${NAMESPACE}|${NAMESPACE}|g" \
              -e "s|\${VAULT_ROLE}|${VAULT_ROLE}|g" \
              -e "s|\${VAULT_IMAGE}|${VAULT_IMAGE}|g" \
              -e "s|\${ENVIRONMENT}|${ENVIRONMENT}|g" \
              -e "s|\${VAULT_SERVICE}|${VAULT_SERVICE}|g" \
              -e "s|\${FULL_IMAGE_NAME}|${FULL_IMAGE_NAME}|g" \
              -e "s|\${INGRESSNAMESPACE}|${INGRESSNAMESPACE}|g" \
              -e "s|\${VAULT_SECRET_PATH}|${VAULT_SECRET_PATH}|g" \
              -e "s|\${VAULT_SERVICE_ACCOUNTNAME}|${VAULT_SERVICE_ACCOUNTNAME}|g" \
              -e "s|\${VAULT_REDIS_TLS_SECRET_PATH}|${VAULT_REDIS_TLS_SECRET_PATH}|g" \
              k8/sdpsahel-k8s-resources.yaml > $(Build.ArtifactStagingDirectory)/Build_$(Build.SourceBranchName)_SAH-SDP-SDPGOServices/sdpsahel-k8s-resources.yaml

          # sdp-admin-api
          if [[ "${ENVIRONMENT}" == "prod" || "${ENVIRONMENT}" == "preprod" ]]; then
            sed -i '/vault.hashicorp.com\/agent-inject: '\''true'\''/a\
                  vault.hashicorp.com/namespace: '\'''"${VAULT_NAMESPACE}"''\''\' k8/sdpadmin-k8s-resources.yaml
