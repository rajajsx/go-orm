- stage: Deploy
  displayName: Deploy to Kubernetes
  dependsOn: 
    - CheckChanges
    - BuildAndPush
  variables:
    BUILD_ALL_SERVICES: ${{ variables.BUILD_ALL_SERVICES }}
    SDP_ACTIONS_CHANGED: $[ stageDependencies.CheckChanges.DetectChanges.outputs['SetVars.SDP_ACTIONS_CHANGED'] ]
    SDP_ADMIN_CHANGED: $[ stageDependencies.CheckChanges.DetectChanges.outputs['SetVars.SDP_ADMIN_CHANGED'] ]
    DEPLOYMENT_FILES_CHANGED: $[ stageDependencies.CheckChanges.DetectChanges.outputs['SetVars.DEPLOYMENT_FILES_CHANGED'] ]
    SDP_EXAMPLE_CHANGED: $[ stageDependencies.CheckChanges.DetectChanges.outputs['SetVars.SDP_EXAMPLE_CHANGED'] ]
    SDP_SAHEL_CHANGED: $[ stageDependencies.CheckChanges.DetectChanges.outputs['SetVars.SDP_SAHEL_CHANGED'] ]
    SDP_RELAY_WORKER_CHANGED: $[ stageDependencies.CheckChanges.DetectChanges.outputs['SetVars.SDP_RELAY_WORKER_CHANGED'] ]
    SDP_AUDIT_PROCESSOR_CHANGED: $[ stageDependencies.CheckChanges.DetectChanges.outputs['SetVars.SDP_AUDIT_PROCESSOR_CHANGED'] ]
    SDP_ELASTIC_SYNC_CHANGED: $[ stageDependencies.CheckChanges.DetectChanges.outputs['SetVars.SDP_ELASTIC_SYNC_CHANGED'] ]
    SDP_BACKGROUND_JOBS_CHANGED: $[ stageDependencies.CheckChanges.DetectChanges.outputs['SetVars.SDP_BACKGROUND_JOBS_CHANGED'] ]
    SDP_NOTIFICATIONS_WORKER_CHANGED: $[ stageDependencies.CheckChanges.DetectChanges.outputs['SetVars.SDP_NOTIFICATIONS_WORKER_CHANGED'] ]
    SDP_SLA_LISTENER_CHANGED: $[ stageDependencies.CheckChanges.DetectChanges.outputs['SetVars.SDP_SLA_LISTENER_CHANGED'] ]
    AUTH_SERVICE_CHANGED: $[ stageDependencies.CheckChanges.DetectChanges.outputs['SetVars.AUTH_SERVICE_CHANGED'] ]
  jobs:
  - deployment: Deploy
    displayName: Deploy to Kubernetes
    environment: ${{ variables['Build.SourceBranchName'] }}
    strategy:
      runOnce:
        deploy:
          steps:
          - task: DownloadBuildArtifacts@0
            displayName: Download Kubernetes Manifests
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: 'Build_$(Build.SourceBranchName)_SAH-SDP-SDPGOServices'
              downloadPath: '$(Pipeline.Workspace)'

          # Apply Kubernetes Manifests - SDP_Actions
          - task: Kubernetes@1
            displayName: Apply Kubernetes Deployment
            condition: or(eq(variables.SDP_ACTIONS_CHANGED, 'true'), eq(variables.DEPLOYMENT_FILES_CHANGED, 'true'), eq(variables.BUILD_ALL_SERVICES, 'true'))
            inputs:
              connectionType: 'KubernetesServiceConnection'
              kubernetesServiceEndpoint: '$(K8S_SERVICE_CONNECTION)'
              # namespace: '$(NAMESPACE)'
              command: 'apply'
              useConfigurationFile: true
              configuration: '$(Pipeline.Workspace)/Build_$(Build.SourceBranchName)_SAH-SDP-SDPGOServices/sdpactions-k8s-resources.yaml'
              arguments: '--validate=false --insecure-skip-tls-verify'

          - task: Kubernetes@1
            displayName: Apply Kubernetes Deployment
            condition: or(eq(variables.AUTH_SERVICE_CHANGED, 'true'), eq(variables.DEPLOYMENT_FILES_CHANGED, 'true'), eq(variables.BUILD_ALL_SERVICES, 'true'))
            inputs:
              connectionType: 'KubernetesServiceConnection'
              kubernetesServiceEndpoint: '$(K8S_SERVICE_CONNECTION)'
              # namespace: '$(NAMESPACE)'
              command: 'apply'
              useConfigurationFile: true
              configuration: '$(Pipeline.Workspace)/Build_$(Build.SourceBranchName)_SAH-SDP-SDPGOServices/authentication-k8s-resources.yaml'
              arguments: '--validate=false --insecure-skip-tls-verify'

